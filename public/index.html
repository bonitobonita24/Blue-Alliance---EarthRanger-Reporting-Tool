<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EarthRanger Patrol Manager</title>
    <style>
      :root {
        --ink: #000;
        --canvas: #fff;
        --soft: #f7f7f5;
        --line: #e6e6e6;
        --lime: #dceeb1;
        --lilac: #c5b0f4;
        --cream: #f4ecd6;
        --mint: #c8e6cd;
        --pink: #efd4d4;
        --navy: #1f1d3d;
        --danger: #b42318;
        --success: #1ea64a;
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--canvas);
        color: var(--ink);
      }

      button {
        border: 0;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 18px;
        justify-content: space-between;
        min-height: 64px;
        padding: 12px clamp(16px, 4vw, 40px);
      }

      .brand {
        align-items: center;
        display: flex;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        align-items: center;
        background: var(--ink);
        border-radius: 8px;
        color: var(--canvas);
        display: grid;
        flex: 0 0 auto;
        font-size: 13px;
        font-weight: 800;
        height: 38px;
        justify-items: center;
        line-height: 1;
        width: 38px;
      }

      .brand h1 {
        font-size: 30px;
        font-weight: 760;
        line-height: 1.05;
        margin: 0;
      }

      .brand p,
      .timestamp {
        color: #575757;
        font-size: 13px;
        line-height: 1.35;
        margin: 3px 0 0;
      }

      .refresh {
        align-items: center;
        background: var(--ink);
        border-radius: 999px;
        color: var(--canvas);
        display: inline-flex;
        flex: 0 0 auto;
        font-size: 14px;
        font-weight: 700;
        gap: 8px;
        min-height: 42px;
        padding: 0 18px;
      }

      .refresh:disabled {
        cursor: wait;
        opacity: 0.64;
      }

      main {
        padding: clamp(16px, 4vw, 40px);
      }

      .status-strip {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-bottom: 20px;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 114px;
        padding: 16px;
      }

      .metric:nth-child(1) {
        background: var(--lime);
      }

      .metric:nth-child(2) {
        background: var(--lilac);
      }

      .metric:nth-child(3) {
        background: var(--cream);
      }

      .metric:nth-child(4) {
        background: var(--mint);
      }

      .metric span {
        display: block;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1.2;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        font-size: 42px;
        line-height: 1;
        margin-top: 16px;
      }

      .workspace {
        display: block;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .panel-head {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 12px;
        justify-content: space-between;
        min-height: 64px;
        padding: 12px;
      }

      .state-pill {
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        display: inline-flex;
        font-size: 13px;
        font-weight: 700;
        gap: 8px;
        min-height: 36px;
        padding: 0 12px;
      }

      .dot {
        background: var(--success);
        border-radius: 999px;
        height: 8px;
        width: 8px;
      }

      .dot.error {
        background: var(--danger);
      }

      .list {
        min-height: 390px;
        overflow: auto;
      }

      .data-table {
        border-collapse: collapse;
        min-width: 1120px;
        width: 100%;
      }

      .data-table th,
      .data-table td {
        border-bottom: 1px solid var(--line);
        border-right: 1px solid var(--line);
        font-size: 13px;
        line-height: 1.35;
        padding: 12px 14px;
        text-align: left;
        vertical-align: top;
      }

      .data-table th {
        background: var(--soft);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0;
        position: sticky;
        text-transform: uppercase;
        top: 0;
        z-index: 1;
      }

      .data-table th:last-child,
      .data-table td:last-child {
        border-right: 0;
      }

      .data-table tbody tr:hover {
        background: var(--soft);
      }

      .id-cell {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        max-width: 210px;
        overflow-wrap: anywhere;
      }

      .number-cell {
        font-variant-numeric: tabular-nums;
        text-align: right;
        white-space: nowrap;
      }

      .row {
        background: var(--canvas);
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 12px;
        grid-template-columns: minmax(0, 1fr) auto;
        padding: 18px;
      }

      .row:last-child {
        border-bottom: 0;
      }

      .row:hover {
        background: var(--soft);
      }

      .row-title {
        font-size: 18px;
        font-weight: 780;
        line-height: 1.25;
        margin: 0;
      }

      .row-meta {
        color: #555;
        display: flex;
        flex-wrap: wrap;
        font-size: 13px;
        gap: 8px;
        line-height: 1.35;
        margin: 8px 0 0;
      }

      .badge {
        background: var(--soft);
        border: 1px solid var(--line);
        border-radius: 999px;
        display: inline-flex;
        font-size: 12px;
        font-weight: 800;
        justify-content: center;
        line-height: 1;
        min-width: 82px;
        padding: 8px 10px;
        text-transform: uppercase;
      }

      .badge.amber {
        background: var(--cream);
      }

      .badge.active,
      .badge.open {
        background: var(--mint);
      }

      .empty,
      .loading,
      .error {
        align-content: center;
        display: grid;
        min-height: 390px;
        padding: 24px;
      }

      .loading {
        background: var(--soft);
      }

      .error {
        background: var(--pink);
      }

      .empty strong,
      .loading strong,
      .error strong {
        font-size: 22px;
        line-height: 1.2;
      }

      .empty p,
      .loading p,
      .error p {
        color: #444;
        font-size: 15px;
        line-height: 1.5;
        margin: 10px 0 0;
        max-width: 620px;
      }

      @media (max-width: 900px) {
        .status-strip {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .refresh {
          width: 100%;
          justify-content: center;
        }
      }

      @media (max-width: 560px) {
        main {
          padding: 12px;
        }

        .brand h1 {
          font-size: 24px;
        }

        .metric strong {
          font-size: 30px;
        }

        .panel-head {
          align-items: stretch;
          flex-direction: column;
        }

        .row {
          grid-template-columns: 1fr;
        }

        .badge {
          width: max-content;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">ER</div>
          <div>
            <h1>EarthRanger Patrol Manager</h1>
            <p>Mindoro operations feed</p>
          </div>
        </div>
        <button class="refresh" id="refreshButton" type="button">Refresh patrol index</button>
      </header>

      <main>
        <section class="status-strip" aria-label="EarthRanger summary">
          <article class="metric">
            <span>Connection</span>
            <strong id="connectionMetric">...</strong>
          </article>
          <article class="metric">
            <span>Total Patrols</span>
            <strong id="patrolsMetric">...</strong>
          </article>
          <article class="metric">
            <span>Displayed</span>
            <strong id="displayedMetric">...</strong>
          </article>
          <article class="metric">
            <span>Last check</span>
            <strong id="checkedMetric">...</strong>
          </article>
        </section>

        <section class="workspace">
          <div class="panel">
            <div class="panel-head">
              <div>
                <p class="row-title">Patrol index</p>
                <p class="row-meta">Patrol ID / Patrol Type / Patrol Title / Total Hours / Start Date / End Date / Start Location / End Location</p>
              </div>
              <div class="state-pill"><span class="dot" id="stateDot"></span><span id="stateLabel">Loading</span></div>
            </div>
            <div class="list" id="content" role="tabpanel" aria-live="polite"></div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const state = {
        loading: false,
        health: null,
        patrols: null,
        error: null
      };

      const endpoints = {
        health: '/api/health',
        patrols: '/api/patrols?page_size=50'
      };

      const content = document.getElementById('content');
      const refreshButton = document.getElementById('refreshButton');
      const stateDot = document.getElementById('stateDot');
      const stateLabel = document.getElementById('stateLabel');

      refreshButton.addEventListener('click', () => refreshAll());

      refreshAll();

      async function refreshAll() {
        state.error = null;
        state.loading = true;
        render();

        await Promise.all(['health', 'patrols'].map((view) => loadView(view, false)));

        state.loading = false;
        render();
      }

      async function loadView(view, shouldRender = true) {
        if (shouldRender) {
          state.loading = true;
          render();
        }

        try {
          const response = await fetch(endpoints[view]);
          const json = await response.json();
          state[view] = json;
          if (!response.ok) throw new Error(json.error || 'Request failed');
        } catch (error) {
          state.error = error.message;
        } finally {
          if (shouldRender) {
            state.loading = false;
            render();
          }
        }
      }

      function render() {
        const hasError = Boolean(state.error);
        const isConnected = Boolean(state.health && state.health.ok);
        const patrolCollection = getCollection(state.patrols);

        refreshButton.disabled = state.loading;
        document.getElementById('connectionMetric').textContent = isConnected ? 'Live' : hasError ? 'Error' : '...';
        document.getElementById('patrolsMetric').textContent = formatCount(patrolCollection.count);
        document.getElementById('displayedMetric').textContent = formatCount(patrolCollection.results.length);
        document.getElementById('checkedMetric').textContent = formatTime(state.health && state.health.checkedAt);

        stateDot.classList.toggle('error', hasError || !isConnected);
        stateLabel.textContent = state.loading ? 'Loading' : isConnected ? 'Connected' : 'Needs attention';

        if (state.loading && !state.patrols) {
          content.innerHTML = loadingMarkup();
          return;
        }

        if (state.error && !state.patrols) {
          content.innerHTML = errorMarkup(state.error);
          return;
        }

        content.innerHTML = renderPatrolTable(patrolCollection.results);
      }

      function renderPatrolTable(rows) {
        if (!rows.length) {
          return '<div class="empty"><strong>No records returned.</strong><p>The endpoint responded successfully with an empty result set.</p></div>';
        }

        const sortedRows = [...rows].sort((left, right) => {
          return Number(right.serial_number || 0) - Number(left.serial_number || 0);
        });

        const tableRows = sortedRows.map((item) => {
          const row = normalizePatrol(item);
          return `
            <tr>
              <td class="id-cell">${escapeHtml(row.patrolId)}</td>
              <td>${escapeHtml(row.patrolType)}</td>
              <td>${escapeHtml(row.patrolTitle)}</td>
              <td class="number-cell">${escapeHtml(row.totalHours)}</td>
              <td>${escapeHtml(row.startDate)}</td>
              <td>${escapeHtml(row.endDate)}</td>
              <td>${escapeHtml(row.startLocation)}</td>
              <td>${escapeHtml(row.endLocation)}</td>
            </tr>
          `;
        }).join('');

        return `
          <table class="data-table" aria-label="Patrol index">
            <thead>
              <tr>
                <th>Patrol ID</th>
                <th>Patrol Type</th>
                <th>Patrol Title</th>
                <th>Total Hours</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Start Location</th>
                <th>End Location</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        `;
      }

      function normalizePatrol(item) {
        const segments = Array.isArray(item.patrol_segments) ? item.patrol_segments : [];
        const firstSegment = segments[0] || {};
        const lastSegment = segments[segments.length - 1] || firstSegment;
        const startTime = firstValue(
          firstSegment.time_range && firstSegment.time_range.start_time,
          firstSegment.scheduled_start,
          item.start_time,
          latestUpdateTime(item)
        );
        const endTime = firstValue(
          lastSegment.time_range && lastSegment.time_range.end_time,
          lastSegment.scheduled_end,
          item.end_time
        );

        return {
          patrolId: item.serial_number || item.id || '-',
          patrolType: formatLabel(firstValue(firstSegment.patrol_type, item.patrol_type, item.type)),
          patrolTitle: firstValue(item.title, item.objective, item.serial_number ? `Patrol ${item.serial_number}` : ''),
          totalHours: formatHours(totalPatrolMilliseconds(segments, startTime, endTime)),
          startDate: formatDateTime(startTime) || '-',
          endDate: formatDateTime(endTime) || '-',
          startLocation: formatLocation(firstSegment.start_location || item.start_location),
          endLocation: formatLocation(lastSegment.end_location || item.end_location)
        };
      }

      function getCollection(payload) {
        const data = payload && payload.data ? payload.data : {};
        return {
          count: typeof data.count === 'number' ? data.count : null,
          results: Array.isArray(data.results) ? data.results : []
        };
      }

      function latestUpdateTime(item) {
        return item.updates && item.updates[0] ? item.updates[0].time : '';
      }

      function firstValue(...values) {
        return values.find((value) => value !== undefined && value !== null && value !== '') || '-';
      }

      function totalPatrolMilliseconds(segments, fallbackStart, fallbackEnd) {
        const total = segments.reduce((sum, segment) => {
          const start = segment.time_range && segment.time_range.start_time;
          const end = segment.time_range && segment.time_range.end_time;
          if (!start || !end) return sum;
          const duration = new Date(end).getTime() - new Date(start).getTime();
          return Number.isFinite(duration) && duration > 0 ? sum + duration : sum;
        }, 0);

        if (total > 0) return total;
        if (fallbackStart && fallbackEnd && fallbackStart !== '-' && fallbackEnd !== '-') {
          const duration = new Date(fallbackEnd).getTime() - new Date(fallbackStart).getTime();
          return Number.isFinite(duration) && duration > 0 ? duration : 0;
        }
        return 0;
      }

      function formatHours(milliseconds) {
        if (!milliseconds || milliseconds < 0) return '-';
        return (milliseconds / 36e5).toFixed(2);
      }

      function formatLabel(value) {
        if (!value || value === '-') return '-';
        return String(value)
          .split('_')
          .filter(Boolean)
          .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
          .join(' ');
      }

      function formatLocation(location) {
        if (!location || typeof location.latitude !== 'number' || typeof location.longitude !== 'number') return '-';
        return `${location.latitude.toFixed(5)}, ${location.longitude.toFixed(5)}`;
      }

      function formatCount(value) {
        return typeof value === 'number' ? value.toLocaleString() : '...';
      }

      function formatTime(value) {
        if (!value) return '...';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '...';
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      function formatDateTime(value) {
        if (!value || value === '-') return '';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '';
        return date.toLocaleString([], {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      }

      function loadingMarkup() {
        return '<div class="loading"><strong>Loading patrol index...</strong><p>Fetching the latest EarthRanger patrol records.</p></div>';
      }

      function errorMarkup(message) {
        return `<div class="error"><strong>EarthRanger request failed.</strong><p>${escapeHtml(message)}</p></div>`;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        })[char]);
      }
    </script>
  </body>
</html>
